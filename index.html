<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Day Finder</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }
        input {
            padding: 10px;
            margin: 5px;
            font-size: 16px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        h2 {
            margin-top: 20px;
            color: green;
        }
    </style>
</head>
<body>

    <h1>Find Day from Date</h1>

    <input type="number" id="day" placeholder="Date (1-31)">
    <input type="number" id="month" placeholder="Month (1-12)">
    <input type="number" id="year" placeholder="Year (e.g. 1996)">
    <br>
    <button onclick="findDay()">Find Day</button>

    <h2 id="result"></h2>

    <script>
        function findDay() {
            let d = document.getElementById("day").value;
            let m = document.getElementById("month").value;
            let y = document.getElementById("year").value;

            if (!d || !m || !y) {
                document.getElementById("result").innerText = "Please fill all fields";
                return;
            }

            let date = new Date(y, m - 1, d);

            let days = ["Sunday-रविवार", "Monday-सोमवार", "Tuesday-मंगलवार", "Wednesday-बुधवार", "Thursday-गुरुवार", "Friday-शुक्रवार", "Saturday-शनिवार"];

            let resultDay = days[date.getDay()];

            document.getElementById("result").innerText = "Day: " + resultDay;
        }
    </script>

</body>
</html>
